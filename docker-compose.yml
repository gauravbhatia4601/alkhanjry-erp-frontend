# ------------------------------------------------------------------------------
#  Docker Compose — Al Khanjry ERP (for Coolify / self-hosted use)
# ------------------------------------------------------------------------------
#  Architecture (internal only — only frontend is exposed to the public):
#
#  ┌──────────────┐     ┌──────────────┐     ┌──────────────┐
#  │     User     │────▶│  Frontend    │────▶│   Backend    │
#  │   (Public)   │     │  Nginx :80   │     │PHP-FPM+Nginx │
#  └──────────────┘     └──────────────┘     └──────────────┘
#                                                       │
#                              Docker internal network  │
#                                                       ▼
#                                              ┌──────────────┐
#                                              │   MySQL      │
#                                              │  (Coolify)   │
#                                              └──────────────┘
#
#  Required Environment Variables:
#  ──────────────────────────────
#   DB_HOST                → Name/hostname of MySQL container in Coolify network
#   DB_DATABASE            → Name of the database
#   DB_USERNAME            → DB user
#   DB_PASSWORD            → DB password
#
#  APP_KEY is auto-generated by entrypoint.sh if missing.
# ------------------------------------------------------------------------------

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - alkhanjry-network
      - coolify
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    depends_on: []

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - alkhanjry-network
      - coolify
    depends_on:
      backend:
        condition: service_healthy

networks:
  alkhanjry-network:
    driver: bridge
  coolify:
    external: true
